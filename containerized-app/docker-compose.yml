version: "3.9"

services:

  database:
    build: ./database
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      mymacvlan:
        ipv4_address: 172.20.224.50
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend_container
    restart: always
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_HOST: 172.20.224.50
      DB_USER: myuser
      DB_PASSWORD: mypassword
      DB_NAME: mydb
      DB_PORT: 5432
      PORT: 3000
    networks:
      mymacvlan:
        ipv4_address: 172.20.224.51
    ports:
      - "3000:3000"

volumes:
  pgdata:

networks:
  mymacvlan:
    external: true